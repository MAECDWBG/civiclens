*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0fdf4;min-height:100vh}
#root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
input,textarea,button{font-family:inherit}
textarea{resize:none}
.spin{animation:spin 1s linear infinite}

.bounce{animation:bou .8s infinite alternate}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#bbf7d0;border-radius:4px}
.clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

<body>
<div id="root"></div>
<script>

const P="#14532d", P2="#16a34a", ACC="#ea580c";

   location:"Commercial Street, Bus Stop 12",status:"reported",upvotes:19,reporter:"Vijay P.",
   timestamp:Date.now()-4*864e5,department:"Roads & Infrastructure Dept.",verified:false,verifications:4,comments:3,tags:["pedestrian","accessibility"]},
];

const BOARD=[
  {name:"Rahul S.",pts:1240,issues:28,medal:"🥇"},
  {name:"Priya M.",pts:980, issues:22,medal:"🥈"},
  {name:"Amit K.", pts:760, issues:17,medal:"🥉"},
  {name:"Sunita R.",pts:620,issues:14,medal:"⭐"},

];

// State
let state = {
  view:"feed", issues:[...SEED], filter:"all", search:"",
  selected:null, step:1, form:{description:"",location:""},
  analysis:null, aiLoading:false,
  complaint:"", cLoading:false, showC:false,
  pts:340, done:false, imgPrev:null,
  insightText:"", insightLoading:false,
};

// Try load persisted issues
try{const s=localStorage.getItem("cl-issues");if(s)state.issues=[...SEED,...JSON.parse(s)];}catch{}

function setState(patch){Object.assign(state,typeof patch==="function"?patch(state):patch);render();}

// Helpers
const ago = ts=>{
  const s=(Date.now()-ts)/1e3;
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
};

const callAI = async prompt=>{
  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})}
  );
  const d=await res.json();
  return d.candidates[0].content.parts[0].text;
};

// DOM Helpers
const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false||c===undefined)continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
};
const div=(a,c)=>h("div",a,c);
const span=(a,c)=>h("span",a,c);
const btn=(a,c)=>h("button",a,c);
const p=(a,c)=>h("p",a,c);
const svg=(w,ht,children)=>{
  const el=document.createElementNS("http://www.w3.org/2000/svg","svg");
  el.setAttribute("width",w);el.setAttribute("height",ht);el.setAttribute("viewBox",`0 0 ${w} ${ht}`);
  for(const c of children)el.appendChild(c);
  return el;
};
const svgEl=(tag,attrs)=>{
  const el=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  return el;
};

// UI Components
const pill=(text,c,bg)=>span({style:{color:c,backgroundColor:bg,fontSize:11,fontWeight:700,
  padding:"2px 8px",borderRadius:99,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",marginRight:4}},
  [text]);

const spinner=(size=24,color=P2)=>{
  const el=div({style:{width:size,height:size,border:`3px solid ${color}33`,
    borderTop:`3px solid ${color}`,borderRadius:"50%"},className:"spin"});
  return el;
};

// Bar Chart (pure CSS)
const barChart=(data,height=150)=>{
  const max=Math.max(...data.map(d=>d.count),1);
  const wrap=div({style:{display:"flex",alignItems:"flex-end",gap:8,height:height+"px",padding:"0 4px"}});
  for(const d of data){
    const pct=(d.count/max)*100;
    const col=div({style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}});
    const barWrap=div({style:{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}});
    const bar=div({style:{width:"100%",height:pct+"%",background:d.fill,borderRadius:"6px 6px 0 0",
      minHeight:d.count>0?8:0,transition:"height .3s",position:"relative"}});
    // value label
    if(d.count>0){
      const lbl=span({style:{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",
        fontSize:10,fontWeight:700,color:"#374151"}},[""+d.count]);
      bar.appendChild(lbl);
    }
    barWrap.appendChild(bar);
    col.appendChild(barWrap);
    col.appendChild(span({style:{fontSize:10,color:"#9ca3af",textAlign:"center"}},[d.name]));
    wrap.appendChild(col);
  }
  return wrap;
};

// Line Chart (SVG)
const lineChart=(data,w=300,ht=110)=>{
  const max=Math.max(...data.map(d=>d.n),1);
  const pts=data.map((d,i)=>({
    x:20+(i/(data.length-1))*(w-40),
    y:ht-20-((d.n/max)*(ht-40))
  }));
  const polyline=pts.map(p=>p.x+","+p.y).join(" ");
  const elements=[
    svgEl("polyline",{points:polyline,fill:"none",stroke:P2,strokeWidth:2.5,strokeLinejoin:"round"}),
  ];
  for(const pt of pts){
    elements.push(svgEl("circle",{cx:pt.x,cy:pt.y,r:3.5,fill:P2}));
  }
  // x labels
  for(let i=0;i<data.length;i++){
    const t=svgEl("text",{x:pts[i].x,y:ht-4,"text-anchor":"middle","font-size":"9","fill":"#9ca3af"});
    t.textContent=data[i].d;
    elements.push(t);
  }
  // grid lines
  for(let i=0;i<=3;i++){
    const y=20+i*((ht-40)/3);
    elements.unshift(svgEl("line",{x1:20,y1:y,x2:w-20,y2:y,stroke:"#f0f0f0",strokeWidth:1}));
  }
  const s=svg(w,ht,elements);
  s.style.width="100%";s.style.height=ht+"px";
  return s;
};

// Pie Chart (SVG)
const pieChart=(data,size=110)=>{
  const cx=size/2,cy=size/2,r=40,ri=26;
  let startAngle=-Math.PI/2;
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  const elements=[];
  for(const d of data){
    if(!d.value)continue;
    const angle=(d.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(startAngle+angle),y2=cy+r*Math.sin(startAngle+angle);
    const xi1=cx+ri*Math.cos(startAngle),yi1=cy+ri*Math.sin(startAngle);
    const xi2=cx+ri*Math.cos(startAngle+angle),yi2=cy+ri*Math.sin(startAngle+angle);
    const large=angle>Math.PI?1:0;
    const path=svgEl("path",{
      d:`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${large} 0 ${xi1} ${yi1} Z`,
      fill:d.fill,stroke:"white",strokeWidth:2
    });
    elements.push(path);
    startAngle+=angle;
  }
  const s=svg(size,size,elements);
  s.style.flexShrink=0;
  return s;
};

// Issue Card
const issueCard=(issue)=>{
  const cat=CAT[issue.category]||CAT.other;
  const sev=SEV[issue.severity]||SEV.medium;
  const sta=STA[issue.status]||STA.reported;
  const card=div({style:{borderLeft:`4px solid ${sev.c}`,background:"white",borderRadius:18,
    padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.07)",cursor:"pointer",marginBottom:12}});
  card.addEventListener("mouseenter",()=>card.style.boxShadow="0 4px 16px rgba(0,0,0,.12)");
  card.addEventListener("mouseleave",()=>card.style.boxShadow="0 1px 4px rgba(0,0,0,.07)");
  card.addEventListener("click",()=>{setState({selected:issue});});

  const top=div({style:{display:"flex",gap:12,alignItems:"flex-start"}});
  const ico=div({style:{background:cat.bg,width:40,height:40,borderRadius:12,
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},[cat.icon]);
  const info=div({style:{flex:1,minWidth:0}});
  const badges=div({style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}});
  badges.appendChild(pill(cat.label,cat.color,cat.bg));
  badges.appendChild(pill(sev.label,sev.c,sev.bg));
  if(issue.verified)badges.appendChild(pill("✓ Verified","#2563eb","#dbeafe"));
  const title=h("div",{style:{fontWeight:700,fontSize:14,color:"#111",lineHeight:1.3}},[issue.title]);
  const loc=span({style:{fontSize:11,color:"#9ca3af"}},[`📍 ${issue.location}`]);
  info.append(badges,title,loc);
  top.append(ico,info);

  const desc=p({className:"clamp2",style:{fontSize:12,color:"#6b7280",marginTop:8,lineHeight:1.5}},[issue.description]);

  const foot=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",
    marginTop:12,paddingTop:10,borderTop:"1px solid #f9fafb"}});
  const left=div({style:{display:"flex",gap:14,alignItems:"center"}});
  const upvoteBtn=btn({style:{display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:700,
    color:"#6b7280",background:"none",border:"none",cursor:"pointer"},
    onClick:(e)=>{e.stopPropagation();
      state.issues=state.issues.map(i=>i.id===issue.id?{...i,upvotes:i.upvotes+1}:i);
      state.pts+=5; render();
    }},["👍 "+issue.upvotes]);
  left.append(upvoteBtn,span({style:{fontSize:12,color:"#9ca3af"}},["💬 "+issue.comments]),span({style:{fontSize:12,color:"#9ca3af"}},["👥 "+issue.verifications]));
  const right=div({style:{display:"flex",alignItems:"center",gap:5,fontSize:12}});
  right.append(span({},[sta.icon]),span({style:{fontWeight:700,color:sta.c}},[sta.label]),
    span({style:{color:"#d1d5db"}},["·"]),span({style:{color:"#9ca3af"}},[ago(issue.timestamp)]));
  foot.append(left,right);
  card.append(top,desc,foot);
  return card;
};

// Views
function renderFeed(){
  const wrap=div({style:{padding:"0"}});
  // Search
  const searchWrap=div({style:{position:"relative",marginBottom:12}});
  const searchIco=span({style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none"}},["🔍"]);
  const searchInp=h("input",{style:{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:12,
    padding:"11px 14px 11px 42px",fontSize:14,outline:"none",background:"white"},
    placeholder:"Search issues or locations…",value:state.search});
  searchInp.addEventListener("input",e=>{state.search=e.target.value;render();});
  searchWrap.append(searchIco,searchInp);

  // Filters
  const filters=div({style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:12}});
  for(const[k,l]of[["all","All"],["active","Active"],["critical","⚠ Critical"],["resolved","✓ Resolved"]]){
    const active=state.filter===k;
    const b=btn({style:{flexShrink:0,padding:"6px 16px",borderRadius:99,border:"none",cursor:"pointer",
      fontWeight:700,fontSize:12,background:active?P2:"white",color:active?"white":"#6b7280",
      boxShadow:active?"0 2px 8px rgba(22,163,74,.3)":"0 1px 3px rgba(0,0,0,.08)"},
      onClick:()=>{state.filter=k;render();}},[l]);
    filters.appendChild(b);
  }

  // Stats
  const stats=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}});
  const resolved=state.issues.filter(i=>i.status==="resolved").length;
  const active=state.issues.filter(i=>i.status!=="resolved").length;
  for(const s of [{l:"Total",v:state.issues.length,c:"#111"},{l:"Active",v:active,c:ACC},{l:"Resolved",v:resolved,c:P2}]){
    stats.appendChild(div({style:{background:"white",borderRadius:14,padding:"12px 8px",textAlign:"center",
      boxShadow:"0 1px 4px rgba(0,0,0,.07)"}},
      [div({style:{fontSize:22,fontWeight:900,color:s.c}},[String(s.v)]),
       span({style:{fontSize:11,color:"#9ca3af"}},[s.l])]));
  }

  // Issues
  const filtered=state.issues.filter(i=>{
    const fOk=state.filter==="all"||(state.filter==="active"&&i.status!=="resolved")||
      (state.filter==="resolved"&&i.status==="resolved")||(state.filter==="critical"&&["high","critical"].includes(i.severity));
    const sOk=!state.search||i.title.toLowerCase().includes(state.search.toLowerCase())||i.location.toLowerCase().includes(state.search.toLowerCase());
    return fOk&&sOk;
  });
  const list=div({});
  if(filtered.length===0){
    list.appendChild(div({style:{textAlign:"center",padding:"48px 0",color:"#d1d5db"}},
      [div({style:{fontSize:40}},["📍"]),div({style:{fontSize:14,marginTop:8}},["No issues found"])]));
  } else {
    for(const i of filtered)list.appendChild(issueCard(i));
  }
  wrap.append(searchWrap,filters,stats,list);
  return wrap;
}

function renderReport(){
  if(state.done){
    return div({style:{textAlign:"center",padding:"80px 20px"}},
      [div({style:{fontSize:60},className:"bounce"},["✅"]),
       div({style:{fontWeight:900,fontSize:22,marginTop:16}},["Issue Reported!"]),
       p({style:{color:"#9ca3af",marginTop:8}},["Your community thanks you."]),
       div({style:{display:"inline-block",background:P2,color:"white",borderRadius:99,
         padding:"10px 24px",fontWeight:700,marginTop:16}},["🌟 +50 pts — Now "+state.pts+" total"])]);
  }

  const wrap=div({});
  // Step indicator
  const steps=div({style:{display:"flex",alignItems:"center",marginBottom:8}});
  for(let s=1;s<=3;s++){
    const dot=div({style:{width:28,height:28,borderRadius:99,display:"flex",alignItems:"center",
      justifyContent:"center",fontSize:12,fontWeight:900,flexShrink:0,
      background:state.step>=s?P2:"#e5e7eb",color:state.step>=s?"white":"#9ca3af"}},[state.step>s?"✓":String(s)]);
    steps.appendChild(dot);
    if(s<3)steps.appendChild(div({style:{flex:1,height:3,borderRadius:2,margin:"0 4px",background:state.step>s?P2:"#e5e7eb"}}));
  }
  const stepLabels=div({style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9ca3af",marginBottom:20}},
    [span({},[" Describe"]),span({},[" AI Review"]),span({},[" Submit"])]);
  wrap.append(steps,stepLabels);

  // Step 1
  if(state.step===1){
    const s1=div({});
    const inp=(label,key,type="input",rows=1)=>{
      const lbl=h("label",{style:{fontSize:12,fontWeight:700,color:"#374151",display:"block",
        marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}},[label]);
      const el=type==="textarea"
        ? h("textarea",{rows:rows,style:{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:12,
            padding:"12px 14px",fontSize:14,outline:"none",marginBottom:14},
            placeholder:key==="description"?"Describe what you see — what, where, and how it affects people…":"Street, landmark, area…"})
        : h("input",{style:{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:12,
            padding:"12px 14px",fontSize:14,outline:"none",marginBottom:14},
            placeholder:"Street, landmark, area…"});
      el.value=state.form[key]||"";
      el.addEventListener("input",e=>{state.form={...state.form,[key]:e.target.value};});
      return div({},[lbl,el]);
    };
    s1.appendChild(inp("What's the issue? *","description","textarea",4));
    s1.appendChild(inp("Location *","location"));

    // Photo
    const fileInp=h("input",{type:"file",accept:"image/*",style:{display:"none"}});
    fileInp.addEventListener("change",e=>{
      const f=e.target.files[0];
      if(f){state.imgPrev=URL.createObjectURL(f);render();}
    });
    const photoDrop=div({style:{border:"2px dashed",borderColor:state.imgPrev?"#16a34a":"#e5e7eb",
      borderRadius:14,padding:24,textAlign:"center",cursor:"pointer",marginBottom:14}});
    photoDrop.addEventListener("click",()=>fileInp.click());
    if(state.imgPrev){
      const img=h("img",{src:state.imgPrev,style:{width:"100%",height:120,objectFit:"cover",borderRadius:10}});
      const chk=div({style:{textAlign:"right",fontSize:12,color:P2,fontWeight:700,marginTop:4}},["✓ Photo added"]);
      photoDrop.append(img,chk);
    } else {
      photoDrop.append(div({style:{fontSize:32}},["📷"]),
        div({style:{fontSize:14,color:"#9ca3af",fontWeight:600,marginTop:4}},["Add Photo"]),
        div({style:{fontSize:11,color:"#d1d5db",marginTop:4}},["AI will use it to categorize"]));
    }
    s1.append(photoDrop,fileInp);

    const analyzeBtn=btn({style:{width:"100%",padding:"13px 0",borderRadius:12,border:"none",
      background:ACC,color:"white",fontWeight:700,fontSize:14,cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",gap:8,
      opacity:state.form.description?1:0.4},
      onClick:async()=>{
        if(!state.form.description)return;
        state.step=2; state.aiLoading=true; render();
        try{
          const raw=await callAI(`You are an AI for a civic issue platform. Analyze this community issue.
Issue: "${state.form.description}"
Location: "${state.form.location||"not specified"}"
Reply ONLY with valid JSON, no markdown:
{"title":"concise title max 8 words","category":"pothole|water|streetlight|waste|other","severity":"low|medium|high|critical","department":"government department name","tags":["tag1","tag2"],"priority_reason":"one sentence","estimated_days":7,"actions":["action1","action2","action3"]}`);
          const clean=raw.replace(/```json|```/g,"").trim();
          state.analysis=JSON.parse(clean);
        }catch{
          state.analysis={title:state.form.description.slice(0,55),category:"other",severity:"medium",
            department:"Municipal Corporation",tags:["infrastructure"],priority_reason:"Requires municipal attention.",
            estimated_days:7,actions:["Document the issue","File formal complaint","Follow up"]};
        }
        state.aiLoading=false; render();
      }},["⚡ Analyze with AI →"]);
    s1.appendChild(analyzeBtn);
    wrap.appendChild(s1);
  }

  // Step 2
  if(state.step===2){
    if(state.aiLoading){
      wrap.appendChild(div({style:{textAlign:"center",padding:"60px 0"}},
        [spinner(40),div({style:{marginTop:16,color:"#9ca3af",fontSize:14}},["AI is analyzing your report…"])]));
    } else if(state.analysis){
      const an=state.analysis;
      const box=div({style:{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:18,padding:16,marginBottom:16}});
      box.appendChild(div({style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        [div({style:{background:P2,color:"white",borderRadius:99,width:24,height:24,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}},["⚡"]),
         span({style:{fontWeight:800,color:P,fontSize:14}},["AI Analysis Complete"])]));

      [spinner(36,"#2563eb"),div({style:{marginTop:12,color:"#9ca3af",fontSize:14}},["AI is drafting your complaint…"])]));
  } else {
    body.append(div({style:{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14,padding:16,
      fontSize:12,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"monospace",marginBottom:16}},
      [state.complaint]),
      btn({style:{width:"100%",padding:"13px 0",borderRadius:12,border:"none",background:"#2563eb",
        color:"white",fontWeight:700,fontSize:14,cursor:"pointer"},
        onClick:()=>navigator.clipboard?.writeText(state.complaint).catch(()=>{})},["📋 Copy Letter"]));
  }
  modal.appendChild(body);
  overlay.appendChild(modal);
  return overlay;
}

// Main Render
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  const app=div({style:{maxWidth:480,margin:"0 auto",minHeight:"100vh",
    display:"flex",flexDirection:"column",position:"relative",background:"#f0fdf4"}});

  // Header
  const header=div({style:{position:"sticky",top:0,zIndex:40,background:"white",
    borderBottom:"1px solid #f3f4f6",padding:"12px 16px",display:"flex",
    justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}});
  const titles={feed:"CivicLens 🌿",report:"Report Issue",dashboard:"Community Data",profile:"My Profile"};
  header.append(span({style:{fontWeight:900,fontSize:18,color:P}},[titles[state.view]]),
    div({style:{display:"flex",alignItems:"center",gap:8}},
      [div({style:{background:P2,color:"white",borderRadius:99,padding:"6px 12px",fontSize:12,fontWeight:800}},["🌟 "+state.pts]),
       div({style:{background:"#f3f4f6",width:34,height:34,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},["🔔"])]));
  app.appendChild(header);

  // Content
  const content=div({style:{flex:1,overflowY:"auto",padding:"16px 16px 100px"}});
  if(state.view==="feed")content.appendChild(renderFeed());
  if(state.view==="report")content.appendChild(renderReport());
  if(state.view==="dashboard")content.appendChild(renderDashboard());
  if(state.view==="profile")content.appendChild(renderProfile());
  app.appendChild(content);

  // Bottom nav
  const nav=div({style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
    width:"100%",maxWidth:480,background:"white",borderTop:"1px solid #f3f4f6",
    padding:"8px 8px 16px",zIndex:40,boxShadow:"0 -2px 12px rgba(0,0,0,.06)"}});
  const navRow=div({style:{display:"flex",justifyContent:"space-around",alignItems:"flex-end"}});
  for(const[k,l,e]of[["feed","Feed","🏠"],["report","Report","➕"],["dashboard","Insights","📊"],["profile","Profile","👤"]]){
    const active=state.view===k; const isRep=k==="report";
    const b=btn({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
      background:"none",border:"none",cursor:"pointer",flex:1,padding:"4px 0"},
      onClick:()=>{state.view=k;if(k==="report"){state.step=1;state.analysis=null;state.imgPrev=null;}render();}});
    if(isRep){
      b.appendChild(div({style:{background:ACC,width:48,height:48,borderRadius:16,display:"flex",
        alignItems:"center",justifyContent:"center",fontSize:22,marginTop:-20,
        boxShadow:"0 4px 16px rgba(234,88,12,.4)"}},[e]));
    } else {
      b.appendChild(div({style:{width:36,height:28,borderRadius:10,display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:20,background:active?"#dcfce7":"transparent"}},[e]));
    }
    b.appendChild(span({style:{fontSize:11,fontWeight:700,color:isRep?ACC:active?P2:"#9ca3af"}},[l]));
    navRow.appendChild(b);
  }
  nav.appendChild(navRow);
  app.appendChild(nav);

  // Modals
  const detail=renderDetail(); if(detail)app.appendChild(detail);
  const complaint=renderComplaint(); if(complaint)app.appendChild(complaint);

  root.appendChild(app);
}

render();
</script>
</body>
</html>
